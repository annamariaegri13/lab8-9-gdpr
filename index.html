<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Exerciții cu document.cookie</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1 {
        text-align: center;
    }

    .section {
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 1px solid #ccc;
    }

    button {
        margin-right: 5px;
        margin-top: 5px;
    }

    .output {
        margin-top: 10px;
        min-height: 20px;
    }
</style>

<script>
    function setCookies() {
        document.cookie = "test1=hello";
        document.cookie = "test2=world";
    }

    function showCookies() {
        document.getElementById("out1").innerText = document.cookie;
    }

    function clearCookies() {
        document.cookie = "test1=; max-age=0";
        document.cookie = "test2=; max-age=0";
    }

    function getTest2() {
        let cookies = document.cookie.split(';');
        for (let c of cookies) {
            let [k, v] = c.trim().split('=');
            if (k === "test2") {
                document.getElementById("out2").innerText = v;
                return;
            }
        }
        document.getElementById("out2").innerText = "nu există";
    }

    function runOnce() {
        alert("Acțiune executată");
    }

    function resetCookie() {
        document.cookie = "test1=reset; max-age=3600";
    }

    function checkCookie() {
        let exists = document.cookie.includes("test1");
        document.getElementById("out5").innerText = exists ? "EXISTĂ" : "NU EXISTĂ";
    }
</script>

</head>

<body>

<h1>Exerciții cu document.cookie</h1>

<div class="section">
    <h3>1. Setarea și afișarea cookie-urilor</h3>
    <button onclick="setCookies()">Setează</button>
    <button onclick="showCookies()">Afișează</button>
    <button onclick="clearCookies()">Curăță</button>
    <div class="output" id="out1"></div>
</div>

<div class="section">
    <h3>2. Obținerea unei valori specifice</h3>
    <button onclick="getTest2()">Obține test2</button>
    <button onclick="clearCookies()">Curăță</button>
    <div class="output" id="out2"></div>
</div>

<div class="section">
    <h3>3. Acțiune o singură dată</h3>
    <button onclick="runOnce()">Execută</button>
</div>

<div class="section">
    <h3>4. Resetarea cookie-ului</h3>
    <button onclick="resetCookie()">Resetează</button>
</div>

<div class="section">
    <h3>5. Verificare cookie</h3>
    <button onclick="checkCookie()">Verifică</button>
    <button onclick="clearCookies()">Curăță</button>
    <div class="output" id="out5"></div>
</div>

</body>
</html>
